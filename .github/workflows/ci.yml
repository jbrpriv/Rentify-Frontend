name: Frontend CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint & E2E ──────────────────────────────────────────────────────────
  test:
    name: Lint & Cypress E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Run Cypress E2E tests
        uses: cypress-io/github-action@v6
        env:
          CYPRESS_BASE_URL: ${{ secrets.CYPRESS_BASE_URL }}
          CYPRESS_apiUrl: ${{ secrets.NEXT_PUBLIC_API_URL }}
          CYPRESS_LANDLORD_EMAIL: ${{ secrets.CYPRESS_LANDLORD_EMAIL }}
          CYPRESS_LANDLORD_PASSWORD: ${{ secrets.CYPRESS_LANDLORD_PASSWORD }}
          CYPRESS_TENANT_EMAIL: ${{ secrets.CYPRESS_TENANT_EMAIL }}
          CYPRESS_TENANT_PASSWORD: ${{ secrets.CYPRESS_TENANT_PASSWORD }}
          CYPRESS_ADMIN_EMAIL: ${{ secrets.CYPRESS_ADMIN_EMAIL }}
          CYPRESS_ADMIN_PASSWORD: ${{ secrets.CYPRESS_ADMIN_PASSWORD }}

      - name: Upload Cypress screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots